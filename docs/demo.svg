<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 640" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Consolas, monospace" font-size="12.5">
  <style>
    .t { fill: #c9d1d9; }
    .dim { fill: #8b949e; }
    .grn { fill: #3fb950; }
    .yel { fill: #d29922; }
    .red { fill: #f85149; }
    .blu { fill: #58a6ff; }
    .pur { fill: #bc8cff; }
    .stage { opacity: 0; animation: reveal 0.45s ease-out forwards; }
    .s1 { animation-delay: 0.3s; }
    .s2 { animation-delay: 0.9s; }
    .s3 { animation-delay: 1.6s; }
    .s4 { animation-delay: 2.3s; }
    .s5 { animation-delay: 3.1s; }
    .s6 { animation-delay: 3.9s; }
    .s7 { animation-delay: 4.5s; }
    @keyframes reveal { to { opacity: 1; } }
  </style>

  <!-- terminal window -->
  <rect x="0.5" y="0.5" width="779" height="639" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect x="0.5" y="0.5" width="779" height="34" rx="10" fill="#161b22" stroke="#30363d"/>
  <rect x="0.5" y="24" width="779" height="11" fill="#161b22"/>
  <circle cx="22" cy="17.5" r="5.5" fill="#f85149"/>
  <circle cx="42" cy="17.5" r="5.5" fill="#d29922"/>
  <circle cx="62" cy="17.5" r="5.5" fill="#3fb950"/>
  <text x="390" y="21.5" text-anchor="middle" class="dim" font-size="12">aegis-ai — uv run python scripts/demo.py</text>

  <g class="stage s1">
    <text x="24" y="60" class="grn">$ uv run python scripts/demo.py</text>
    <text x="24" y="82" class="t" font-weight="bold">== Aegis AI offline demo ==</text>
    <text x="24" y="102" class="t">1. Ingesting and parsing the synthetic incident (5 services, 4 log formats)</text>
    <text x="24" y="120" class="dim">   781 events parsed</text>
  </g>

  <g class="stage s2">
    <text x="24" y="142" class="t">2. Detecting anomalies</text>
    <text x="24" y="160" class="t">   <tspan class="yel">[frequency_spike]</tspan> booking-api: 90 events (confidence 0.91)</text>
    <text x="24" y="178" class="t">   <tspan class="yel">[new_signature]</tspan> payments · booking-api ×2 · postgres · worker-1 · nginx</text>
    <text x="24" y="196" class="t">   <tspan class="yel">[retry_storm]</tspan> worker-1: 17 events (confidence 0.85)</text>
    <text x="24" y="214" class="t">   <tspan class="yel">[error_ratio_deviation]</tspan> booking-api: 23 events (confidence 0.72)</text>
  </g>

  <g class="stage s3">
    <text x="24" y="236" class="t">3. Correlating and building the causal graph</text>
    <text x="24" y="254" class="dim">   227 nodes, 7425 edges after pruning</text>
  </g>

  <g class="stage s4">
    <text x="24" y="276" class="t">4. Running the multi-agent investigation (scripted provider, offline)</text>
    <text x="24" y="294" class="t">   <tspan class="dim">32%</tspan> <tspan class="blu">[log_analyst]</tspan> Stripe timeout signatures appear first, immediately</text>
    <text x="24" y="310" class="t">        followed by session-leak exceptions and QueuePool exhaustion…</text>
    <text x="24" y="328" class="t">   <tspan class="dim">60%</tspan> <tspan class="blu">[database_investigator]</tspan> Pool pressure pattern matches a leak,</text>
    <text x="24" y="344" class="t">        not organic load…</text>
    <text x="24" y="362" class="t">   <tspan class="dim">80%</tspan> <tspan class="pur">[devils_advocate]</tspan> challenge recorded (doubt 0.30)</text>
    <text x="24" y="380" class="t">  <tspan class="dim">100%</tspan> <tspan class="blu">[incident_commander]</tspan> verdict ready</text>
  </g>

  <g class="stage s5">
    <text x="24" y="410" class="grn" font-weight="bold">ROOT CAUSE PROBABILITY: 82.0%</text>
    <text x="24" y="430" class="t">Database sessions leak in booking-api's payment-timeout path; under Stripe</text>
    <text x="24" y="446" class="t">latency and elevated traffic the connection pool and PostgreSQL slots</text>
    <text x="24" y="462" class="t">exhaust, cascading into a retry storm and user-visible outage.</text>
  </g>

  <g class="stage s6">
    <text x="24" y="490" class="t" font-weight="bold">FAILURE CHAIN:</text>
    <text x="24" y="508" class="t">  <tspan class="blu">payments</tspan>      stripe requests slow down and time out</text>
    <text x="24" y="524" class="t">  <tspan class="blu">booking-api</tspan>   timeout path leaks sessions; QueuePool exhausts</text>
    <text x="24" y="540" class="t">  <tspan class="red">postgres</tspan>      connection slots run out (FATAL)</text>
    <text x="24" y="556" class="t">  <tspan class="yel">worker-1</tspan>      retry storm amplifies the failure</text>
    <text x="24" y="572" class="t">  <tspan class="red">nginx</tspan>         upstream timeouts: user-visible outage</text>
  </g>

  <g class="stage s7">
    <text x="24" y="600" class="dim">done in 1.1s — no database, no API key, no network</text>
    <text x="24" y="622" class="grn">$ <tspan class="t">█</tspan></text>
  </g>
</svg>
