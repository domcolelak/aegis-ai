name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Tests
        run: uv run pytest -q

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AEGIS_TEST_DATABASE_URL: postgresql+asyncpg://aegis:aegis@localhost:5432/aegis_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Integration tests (real PostgreSQL + pgvector, Alembic migration)
        run: uv run pytest -q -m integration tests/integration
